name: illegal-dumping-env

environment:
  type: python

entrypoint:
  command: python inference.py

tasks:
  - id: task_easy
    description: Detect garbage
    grader:
      type: numeric
      min: 0.0
      max: 1.0

  - id: task_medium
    description: Detect dumping
    grader:
      type: numeric
      min: 0.0
      max: 1.0

  - id: task_hard
    description: Predict risk
    grader:
      type: numeric
      min: 0.0
      max: 1.0